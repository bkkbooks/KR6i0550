body:
  text: 明古吳比丘智旭集緣起第一夫諸佛菩薩愍念羣迷不啻如母憶子故種種方便教出苦輪而衆生不了業報因緣罔知斷惡修善淨信日微五濁增盛由此劇苦機感倍關無緣慈應爰有當機名堅淨信咨請世尊曲垂悲救佛乃廣歎地藏功德令其建立方便於是以三種輪相示善惡差別以二種觀道歸一實境界仍誡業重之人不得先修定慧應依懺法得清淨已然後修習二觀尅獲無難此誠末世對症之神劑而方便中之殊勝方便也豫悲障深丁茲法亂律教禪宗淆訛匪一幸逢斯典開我迷雲理觀事儀昭然可踐竊以諸懺十科行法詳略稍殊一一鬮陳纖疑始決罔敢師心乃述緣起勸修第二若佛弟子欲修出世正法者欲現在無諸障緣者欲除滅五逆十惡無間重業者欲求資生衆具皆得充饒者欲令重難輕遮皆得消滅者欲得優婆塞沙彌比丘清淨律儀者欲得菩薩三聚淨戒者欲獲諸禪三昧者欲獲無相智慧者欲求現證三乘果位者欲隨意往生淨佛國土者欲悟無生法忍圓滿證入一實境界者皆應受持修行此懺悔法何以故此是釋迦如來格外弘慈地藏菩薩稱機悲願無苦不拔無樂不與依此修行淨信堅固如經廣明所宜諦信簡擇同行第三經中不言人數多寡準他行法得至十人但須嚴擇必求法器倘無同志獨行彌善或有真實為生死者堪作伴侶十人以內多寡無妨又必先審所求或求律儀或求定慧或求果證或求往生所求相合方可同修於十人內仍須推一夙德為教授師事儀理觀微細秉承切勿鹵莽唐捐苦行占察輪相第四懺悔之法雖則普為衆生發露衆罪然當人無始業習各有偏強是故經中先説占初輪相然後明懺悔法今欲修懺悔者既已嚴淨道場宜於未建首前各占輪相簡察善惡何罪偏重應的悔之於修懺時庶便陳白占法別附於後正修懺法第五準經自列亦具十科第一嚴淨道場經云欲修懺悔者當住靜處隨力所能莊嚴一室內置佛事及安經法懸繒幡蓋求集香華以修供養第二清淨三業經云澡浴身體及洗衣服勿令臭穢準諸行法每至穢處必須更髑衣旋轉既訖洗浴清淨還著淨衣縱一日都不至穢亦須一浴終竟一期或七日或二七三七乃至千日以得三業純善輪相為期於中專莫雜語及一切接對問訊或有所需但可直索不得因事牽發餘語專秉一心念所修法不得剎那念世雜事當思生死大事無常迅速堅精努力乃克有濟倘稍違淨法則唐喪劬勞不可不慎第三香華供養行者初入道場至法座前敷具正身合掌倚立應先緣念一切三寶體常遍滿無所不在衆生迷惑流轉可哀我為衆生翻迷歸悟禮敬三寶作是念已唱言一切恭敬一心恭禮十方常住三寶如是禮已隨所有香華等當修供養作是唱言嚴持香華如法供養願此香華雲遍滿十方界供養一切佛尊法諸賢聖無邊佛土中受用作佛事至此停唱散華作供手執香爐作是想云一切佛法僧寶體常遍滿無所不在願令以此香華等同法性普熏一切諸佛剎土施作佛事十方一切供具無時不有我今當以十方所有一切種種香華瓔珞幢幡寶蓋諸珍妙飾種種音樂燈明燭火飲食衣服臥具湯藥乃至盡十方所有一切種種莊嚴供養之具憶想遙擬普共衆生奉獻供養一切世界中有修供養者我今隨喜若未修供養者願得開導令修供養又願我身速能遍至一切剎土於一一佛法僧所各以一切種莊嚴供養之具共一切衆生等持奉獻供養一切諸佛法身色身舍利形像浮圖廟塔一切佛事供養一切所有法藏及説法處供養一切賢聖僧衆願共一切衆生修行如是供養已漸得成就六波羅蜜四無量心深知一切法本來寂靜無生無滅一味平等離念清淨畢竟圓滿此段全用經文作是念已唱云供養已一切恭敬一禮第四啓請三寶諸天本經無啓請法準餘行儀於建首日宜致三請良以三寶雖無所不在而衆生久積迷惑背覺合塵念與悲隔今既翻迷歸悟應須緣念三寶充滿虗空應物現形如水中月作是念已涕淚翹勤逐位三請手執香爐燒衆名香口作是唱一心奉請南無本師釋迦牟尼佛想云我三業性如虗空釋迦如來亦如是不起真際為衆生與衆俱來受供養下皆準此但改佛名及形相來處至請賢聖則云一切賢聖亦如是餘皆準知三請畢隨作一禮一心奉請南無毗婆尸等過去七佛一心奉請南無普光佛等五十三佛一心奉請南無一切諸佛所有色身舍利形像浮圖廟塔一切佛事想云諸佛法身如虗空化事住世難思議我今三業如法請惟願影現受供養一心奉請南無十方三世一切諸佛一心奉請南無占察善惡業報經微妙法藏想云法性如空不可見常住法寶難思議我今三業如法請惟願影現受供養一心奉請南無十方一切法藏想如上一心奉請南無十方一切賢聖一心奉請南無堅淨信菩薩摩訶薩此是當機啓教之人應念菩薩為我等故請問大法我今得聞此最勝法皆是菩薩莫大恩德一心奉請南無遍吉菩薩觀世音菩薩摩訶薩應念此二菩薩慈悲慧行普度羣迷與地藏菩薩威神無異一心奉請南無地藏菩薩摩訶薩應念此是我等的對懺悔之主依此菩薩大慈大悲威神力故令我無惡不滅無善不生我今歸命啓請如子憶母此為道場正主餘佛菩薩同作證明涕泣求哀猶如面奉必冀菩薩攝受護持觀想偈文應知如上一心奉請梵釋四王天龍八部僧伽藍內護正法者一切聖衆例皆三請但除禮拜白衣無妨惟願釋迦慈父七佛世尊五十三佛一切覺者他心道眼無礙見聞身通自在來降道場攝取我等令成淨信占察善惡業報尊經十方一切清淨法藏等真法性充滿虗空顯現道場受我供養堅淨信菩薩遍吉菩薩觀世音菩薩等十方一切賢聖不捨大慈來臨法座哀憐覆護證我行法地藏菩薩摩訶薩救世真士大智開士善安慰説者速除諸障增淨信者大慈大悲不違本誓放大光明滿我所願護法天龍伽藍真宰隨我請來堅守道場却諸魔障示現吉祥令我所修自在成就每節執爐三説已一禮惟護法處不須禮拜白衣無妨第五讚禮三寶經無讚法不別立科但取十輪經中地藏菩薩讚佛二偈隨行禮敬合為一科我聞遍知海真實德無邊度脫諸有情心歡喜敬禮曾修無量福今得禮尊足願無量劫中常修多供養一心敬禮過去毗婆尸佛想云能禮所禮性空寂感應道交難思議我此道場如帝珠毗婆尸佛影現中我身影現如來前頭面接足歸命禮下皆準此但改佛菩薩名一心敬禮尸棄佛一心敬禮毗舍浮佛一心敬禮拘留孫佛一心敬禮拘那含牟尼佛一心敬禮迦葉佛一心敬禮本師釋迦牟尼佛一心敬禮普光佛一心敬禮普明佛一心敬禮普淨佛一心敬禮多摩羅跋栴檀香佛一心敬禮栴檀光佛一心敬禮摩尼幢佛一心敬禮歡喜藏摩尼寶積佛一心敬禮一切世間樂見上大精進佛一心敬禮摩尼幢燈光佛一心敬禮慧炬照佛一心敬禮海德光明佛一心敬禮金剛牢強普散金光佛一心敬禮大強精進勇猛佛一心敬禮大悲光佛一心敬禮慈力王佛一心敬禮慈藏佛一心敬禮栴檀窟莊嚴勝佛一心敬禮賢善首佛一心敬禮善意佛一心敬禮廣莊嚴王佛一心敬禮金華光佛一心敬禮寶蓋照空自在力王佛一心敬禮虗空寶華光佛一心敬禮琉璃莊嚴王佛一心敬禮普現色身光佛一心敬禮不動智光佛一心敬禮降伏衆魔王佛一心敬禮才光明佛一心敬禮智慧勝佛一心敬禮彌勒仙光佛一心敬禮善寂月音妙尊智王佛一心敬禮世淨光佛一心敬禮龍種上尊王佛一心敬禮日月光佛一心敬禮日月珠光佛一心敬禮慧幢勝王佛一心敬禮師子吼自在力王佛一心敬禮妙音勝佛一心敬禮常光幢佛一心敬禮觀世燈佛一心敬禮慧威燈王佛一心敬禮法勝王佛一心敬禮須彌光佛一心敬禮須摩那華光佛一心敬禮優曇鉢羅華殊勝王佛一心敬禮大慧力王佛一心敬禮阿閦毗歡喜光佛一心敬禮無量音聲王佛一心敬禮才光佛一心敬禮金海光佛一心敬禮山海慧自在通王佛一心敬禮大通光佛一心敬禮一切法幢滿王佛一心敬禮東方一切諸佛所有色身舍利形像浮圖廟塔一切佛事想云諸佛法身如虗空化事住世難思議我皆影現化事前一一皆悉歸命禮一心敬禮東南方一切諸佛所有色身舍利形像浮圖廟塔一切佛事一心敬禮南方一切諸佛所有色身舍利形像浮圖廟塔一切佛事一心敬禮西南方一切諸佛所有色身舍利形像浮圖廟塔一切佛事一心敬禮西方一切諸佛所有色身舍利形像浮圖廟塔一切佛事一心敬禮西北方一切諸佛所有色身舍利形像浮圖廟塔一切佛事一心敬禮北方一切諸佛所有色身舍利形像浮圖廟塔一切佛事一心敬禮東北方一切諸佛所有色身舍利形像浮圖廟塔一切佛事一心敬禮下方一切諸佛所有色身舍利形像浮圖廟塔一切佛事一心敬禮上方一切諸佛所有色身舍利形像浮圖廟塔一切佛事一心敬禮十方三世一切諸佛一心敬禮十方一切法藏三禮此恐太繁依鬮取決倘能隨十方面一一致禮尤為善也想云真空法性如虛空常住法寶難思議我身影現法寶前一心如法歸命禮下一禮同一心敬禮占察善惡業報經微妙法藏一心敬禮十方一切賢聖三禮此亦依鬮取決倘能隨十方面一一致禮尤善一心敬禮堅淨信菩薩摩訶薩一心敬禮遍吉菩薩觀世音菩薩摩訶薩一心敬禮地藏菩薩摩訶薩此是懺主應須三禮想偈如前但末句須云為求滅障接足禮又或各隨所求稱之亦可如求律儀即云為求律儀接足禮求證果求往生等類此可知第六修行懺悔經云應當説所作罪一心仰告夫罪雖無量而就輪相所現者尤為最重能招惡果能障聖道故須慚愧涕淚各別陳之殷勤悔過冀令消滅五體投地説重罪已仍作是念我及衆生無始常為三業六根重罪所障不見諸佛不知出要但順生死不知妙理我今雖知猶與衆生同為一切重罪所障今對地藏十方佛前普為衆生歸命懺悔惟願加護令障消滅作是念已胡跪唱言普為法界一切衆生悉願斷除三障歸命懺悔唱已五體投地復作是念我與衆生無始來今由愛見故內計我人一外加惡友二不隨喜他一毫之善三惟遍三業廣造衆罪四事雖不廣惡心遍布五晝夜相續無有間斷六覆諱過失不欲人知七不畏惡道八無慚無愧九撥無因果十故於今日深信因果一生重慚愧二生大怖畏三發露懺悔四斷相續心五發菩提心斷惡修善六勤䇿三業翻昔重過七隨喜凡聖一毫之善八念十方佛有大福慧能救拔我及諸衆生從二死海置三德岸九從無始來不知諸法本性空寂廣造衆惡今知空寂為求菩提為衆生故廣修諸善遍斷衆惡十惟願一切三寶地藏菩薩慈悲攝受聽我懺悔作是念已胡跪唱言我弟子某甲至心懺悔我及衆生自性清淨一實境界諸佛體同無明癡暗熏習因緣現妄境界令生念著計我我所習諸惡法三業六根廣造衆罪十惡五逆重難輕遮障慧障定障諸戒品致使長淪苦海永無出期設欲修行多諸疑障或擾外魔或遭邪見助緣缺乏淨信不成今遇地藏菩薩摩訶薩善安慰説開我迷雲滌慮洗心求哀悔過惟願十方諸大慈尊證知護念我今懺悔不復更造願我及一切衆生速得除滅無量劫來十惡四重五逆顛倒謗毀三寶一闡提罪如是罪性本惟空寂但從虗妄顛倒心起無有定實而可得者願一切衆生速達心本永滅罪根或一説或三説皆可下四亦然懺悔已歸命禮三寶此懺悔文并下三願皆出本經但於惟願之前撮略經中他處數語以表説所作罪一心仰告之意餘皆一字弗敢移易第七發勸請願我弟子某甲至心勸請願令十方一切菩薩未成正覺者願速成正覺若已成正覺者願常住在世轉正法輪不入涅槃勸請已歸命禮三寶第八發隨喜願我弟子某甲至心隨喜願我及一切衆生畢竟永捨嫉妬之心於三世中一切剎土所有修學一切功德及成就者悉皆隨喜隨喜已歸命禮三寶第九發回向願我弟子某甲至心回向願我所修一切功德資益一切諸衆生等同趣佛智至涅槃城回向已歸命禮三寶第十補發願及端坐靜室稱念名號五悔法門別有發願此經不説蓋以勸請等三即是願故又行人修此懺法所求不同或求律儀或求定慧或求往生淨土或求現在安樂今因鬮決聽許補願是在修行者各自陳白不容預擬成言也然所求之願雖各不同須與四弘相合不得增長生死誠恐不知梗概違背經宗聊陳大意以便行持或用或否任從決擇我弟子某甲至心發願願十方三寶地藏慈尊哀愍護持救拔拯濟令此國土災亂消除正法流通咸生淨信無諸障礙永斷魔邪我及衆生重罪速滅現離衰惱充足資生三聚戒根畢竟清淨二種觀道應念現前三昧總持神通方便四攝六度無不圓成了悟自心一實境界捨身他世生在佛前面奉彌陀歷侍諸佛親蒙授記回入塵勞普會羣迷同歸祕藏發願已歸命禮三寶自歸依佛當願衆生體解大道發無上心自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙和南聖衆次往餘靜室端坐一心若稱誦若默念地藏菩薩其惛蓋多者應於道場中旋繞誦念晝三夜三具如經説七日之後每旦以第二輪相頻三擲之若身口意皆純善者名得清淨若不得三業純善輪相者雖見光明異香吉祥好夢等止名虗妄非善相也若未獲純善輪相以前止許稱念地藏名號未許修行觀法得善相後乃於二種觀道可以如實修之別明二種觀道第六諸懺坐禪一科即於懺畢出壇時修故列在正修第十此經二觀要於懺悔清淨之後方許正修故十科畢方別明之經云彼諸衆生但學至心使身口意得清淨相已我亦護念乃至堪能修習諸禪智慧又云若有衆生欲向大乘者應當先知最初所行根本之業所謂依止一實境界以修信解又云若欲依一實境界修信解者應當學習二種觀道一者唯心識觀二者真如實觀學唯心識觀者於一切時一切處隨身口意有所作業悉當觀察知唯是心乃至一切境界若心住念皆當察知勿使心無記攀緣不自覺知於念念間悉應觀察隨心有所緣念還當使心隨逐彼念令心自知知己內心自生想念非一切境界有念有分別也當應如是守記內心知唯妄念無實境界勿令休廢是名修學唯心識觀念念觀知唯心生滅如水流燈𦦨無暫時住從是當得色寂三昧得此三昧已次應學習信奢摩他觀心及信毗婆舍那觀心學真如實觀者思惟心性無生無滅不住見聞覺知離一切分別想漸漸能過四空定境界相得相似空三昧展轉能入心寂三昧即復能入一行三昧見佛無數發深廣心住堅信位所謂於奢摩他毗婆舍那二種觀道決定信解能決定向復次修學如上信解者人有二種一者利根先已能知一切外境惟心所作虗誑不實如夢如幻等決定無疑障蓋輕微散亂心少如是等人即應學習真如實觀二者鈍根先未能知一切外境悉唯是心染著情厚蓋障數起心難調伏應當先學唯心識觀今依經文略出其意此經本以一實境界為體二種觀道為宗若非洞明一實境界無以稱性起於二觀若非殷勤修習二觀無以契會一實境界一實境界者即是不思議境亦名諸法實相謂境界即諸法一實即實相境界即事造三千一實即理具三千境界即權一實即實權實不二理事一如故名一實境界又以境界從一實則一空一切空不思議真諦也以一實從境界則一假一切假不思議俗諦也直云一實境界則一中一切中不思議中道第一義諦也故經云妄心畢竟無體不可見故若無覺知能分別者則無十方三世一切境界差別之相豈非即空義耶又云無分別相者於一切處無所不在以能依持建立一切法故豈非即假義耶又云衆生心體從本以來不生不滅自性清淨又云當知一切諸法悉名為心以義體不異為心所攝故又云一切衆生種種果報皆依諸佛法身而有建立生長住法身中為法身處所攝以法身為體無有能出法身界分者豈非即中義耶故知一實境界則已收盡中論一偈之旨境界即因緣所生法一實即是空假中也中論約觀故先立境此經顯諦故先出理依此一實境界以修信解則知二種觀道全是不思議法門而復於中分利分鈍者略出二意一者此經雖正明圓頓宗旨而兼攝別機名圓為利名別為鈍二者雖是圓機於中仍分利鈍初意者圓教行人於名字位中能知如來祕密之藏肉眼即名佛眼故能學習真如實觀了知現前心性本自不生不復更滅所謂法界一相雖三千歷然而究竟平等此即名字位中初修觀行之法也得相似空三昧位登五品圓伏五住故超過空等定境界相入心寂三昧即能入一行三昧住堅信位所謂六根清淨相似即佛也故於奢摩他毗婆舍那二種觀道決定信解能決定向以奢摩他是不思議三止毗婆舍那是不思議三觀止觀不二即是般若第一義空首楞嚴究竟解脫初住分證任運現前十信位中名得決定也若別教行人名字位中雖聞中道未能了知但可仰信故須先學唯心識觀了知實無外境唯有內心即是從假入空不無次第故先得色寂三昧準位當在別教十信若望圓教位在五品次應學習信奢摩他毗婆舍那二觀則教之捨別從圓也次意者圓教利機即於識心體其本寂三千宛然即空假中故云即應學習真如實觀其稍鈍者必須照於起心變造十界即空假中故云應當先學唯心識觀也然於一實境界若善能得意則稱性所起二觀用雖不同實無優劣言用不同者如詳解云唯識歷事真如觀理觀本寂三千為理觀照起心變造十界名事觀從理惟達法性從事專照起心又直觀一念本具三千名理觀縱任三性用於四運推檢起心變造十界名事觀故古人約起心不起心推運不推運分之言無優劣者如詳解云須知占察知唯是心則於色界及諸外境不起分別所以經云色寂三昧非謂事觀專觀外色真如實觀思惟心性不生不滅以能超過無色四空心及心所二俱寂滅是故經云心寂三昧非謂理觀唯在內心又云修理觀者雖云但觀理具須知全修在性則善修實相觀也修事觀者雖觀能造十界之心須知全性成修則善修唯識觀也又指要鈔云應知觀於內心二觀既爾觀於外境二觀亦然以此言之則一色一香一塵一法皆了唯心同歸真實隨宜方便究竟無殊又此二觀雖云懺悔得清淨相乃可修之而正行懺悔及稱念地藏名時非無二觀如修懺時始從香華供養終至三歸歷事分明運想無滯知唯心作無實境界是名唯心識觀若始從供養乃至三歸事雖歷歷一心不生是名真如實觀又稱名時歷歷分明知心如幻地藏洪名不離自心是名唯心識觀若觀地藏法身及一切諸佛法身與己自身體性平等無二無別不生不滅常樂我淨功德圓滿是名真如實觀又既得善相正修二觀之時亦可仍前修行懺法及稱名號即以懺法稱名助成二觀轉更分明所以菩薩五悔法門始自凡夫終於等覺無不以之為進修方便須知作法取相無生三種懺法後後具於前前前前亦通後後事理相扶始終一致方名圓頓法門倘輕忽事相高談名理重罪不滅善法不生是故末世行人切須體會堅淨信菩薩問法苦心深究地藏大士立法本意以真實不欺誑心不忽略心痛切為生死心無上大菩提心於此經中開發正解成就真修得堅固信不墮疑障如或不然遇饌不食寶山空回救世真士大智開士亦未如之何也矣附占輪相法至心敬禮十方一切諸佛願令十方一切衆生速疾皆得親近供養𧫎受正法至心敬禮十方一切法藏願令十方一切衆生速疾皆得受持讀誦如法修行及為他説至心敬禮十方一切賢聖願令十方一切衆生速疾皆得親近供養發菩提心至不退轉至心敬禮地藏菩薩摩訶薩願令十方一切衆生速得除滅惡業重罪離諸障礙資生衆具悉皆充足如是禮已隨所有香華等當修供養作是唱言嚴持香華如法供養願此香華雲遍滿十方界供養一切佛尊法諸賢聖無邊佛土中受用作佛事至此停唱散華作供復運想云一切佛法僧寶乃至離念清淨畢竟圓滿全文具懺儀中須精熟之使運想不滯供養已一切恭敬一禮次復別用香華係心供養地藏菩薩一心告言弟子某甲現是生死凡夫罪障深重不知三世業報因緣多懷疑惑今以其事敬依菩薩所示三種輪相如法占察至心仰叩地藏慈尊願以大悲力加被拯接除我疑障作是語已五體投地胡跪合掌一心稱念南無地藏菩薩摩訶薩或稱名或默念滿足至千乃作是白地藏菩薩摩訶薩大慈大悲惟願護念我及一切衆生速除諸障增長淨信令今所觀稱實相應作此語已雙手捧於輪相承以淨物至誠殷重仰手傍擲諦觀諦察乃知相應與不相應具如經説須先自熟玩經文知其大意方可擲輪否則自無細心反疑輪為虗設為罪多矣凡占輪相者或欲具占三種輪相應如是禮拜供養稱名作白然後占初輪相就初輪中所現善惡一一主念別占第二輪相次復更占第三輪相若有欲修懺法止占第一第二兩種輪相者亦應如是禮拜供養稱名作白次第占之若有為自為他但占第三輪相欲知三世果報事者亦應如是禮拜供養稱名作白取第三輪相頻三擲之記其所現之數以知吉凶若有修懺已經七日之後欲但占第二輪相求純善相者於清晨時惟須作白頻三擲之附懺壇中齋佛儀南無十方佛南無十方法南無十方僧南無本師釋迦牟尼佛南無過去七佛南無五十三佛南無十方一切佛事南無占察善惡業報經南無堅淨信菩薩南無遍吉菩薩南無觀世音菩薩南無地藏菩薩摩訶薩三稱畢次誦變食真言二十一遍甘露真言三遍灑淨
